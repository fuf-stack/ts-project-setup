name: 'Setup project'
description: 'Sets up node and installs node_modules with pnpm'

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        registry-url: https://registry.npmjs.org/
        cache: pnpm

    - name: Install node_modules
      shell: bash
      # `--ignore-scripts` skips lifecycle scripts for this install step.
      run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts
      env:
        # Redundant with `--ignore-scripts` (kept for explicitness if flags change later).
        # See: https://pnpm.io/cli/config#strict-dep-builds
        PNPM_CONFIG_STRICT_DEP_BUILDS: false

    - name: Build packages
      shell: bash
      run: pnpm build
